# Load the base config (compatible across versions). `make tmux` symlinks it here.
source-file ~/.tmux.base.conf

# Newer settings (e.g., tmux >= 3.3)
# Required by Claude Code: passthrough for escape sequences it sends direct
# to the terminal.
set -g allow-passthrough on

# tmux 3.5+: forward modified keys to Pi using the reliable CSI-u format.
set -g extended-keys-format csi-u
