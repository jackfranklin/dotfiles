# look good
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
# Support undercurls and undercurl colors in Neovim
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setqy=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%d::%p1%{256}%&%d%;m'

# Enable OSC 52 clipboard sharing
set -s set-clipboard on


# better pane splitting
bind-key h split-window -v  -c '#{pane_current_path}'
bind-key v split-window -h  -c '#{pane_current_path}'

bind c new-window -c "#{pane_current_path}"

bind-key b break-pane -d

# slow esc time
# https://github.com/tmux/tmux/issues/353
set -s escape-time 0

# Status bar general style (Catppuccin Latte theme)
set -g status-style "bg=#e6e8ef,fg=#4c4f69"
set -g status-left-length 50
set -g status-right-length 50

# Active and inactive window tabs
set -g window-status-current-style "bold"
set -g window-status-current-format "#[fg=#1e66f5,bg=#e6e8ef]█#[fg=#eff1f5,bg=#1e66f5] #I:#W #[fg=#1e66f5,bg=#e6e8ef]█"
set -g window-status-format "#[fg=#6c6f85,bg=#e6e8ef]  #I:#W  "

# Left status: Session name in a Lavender block
set -g status-left "#[fg=#eff1f5,bg=#7287fd,bold] #S #[fg=#7287fd,bg=#e6e8ef]█"

# Right status: Hostname (only shown if SSH_CLIENT is set)
set -g status-right "#{?SSH_CLIENT,#[fg=#7287fd]#[bg=#e6e8ef]█#[fg=#eff1f5]#[bg=#7287fd]#[bold] #h ,}"

# Pane borders (matches the light theme)
set -g pane-border-style "fg=#dce0e8"
set -g pane-active-border-style "fg=#1e66f5"

# Command line message style
set -g message-style "bg=#e6e8ef,fg=#1e66f5,bold"

# Selection highlight (copy mode)
set -g mode-style "fg=#eff1f5,bg=#1e66f5,bold"

bind R source-file ~/.tmux.conf \; display-message "Config reloaded..."
bind-key r command-prompt -I "#S" "rename-session '%%'"

set -g mouse on


# resizing
bind -n S-Left resize-pane -L 6
bind -n S-Right resize-pane -R 6
bind -n S-Down resize-pane -D 3
bind -n S-Up resize-pane -U 3

# Left status length is configured above


# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

# Smart pane resizing with awareness of Vim splits.
bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l' 'resize-pane -R 3'


bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# this will renumber windows automatically when one gets deleted
set-option -g renumber-windows on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Use vim keybindings in copy mode
setw -g mode-keys vi

bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1
